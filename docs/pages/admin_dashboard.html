<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - GrievMitra Portal</title>
    <link rel="stylesheet" href="../css/main.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-surface">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 id="welcome-message" class="text-3xl font-bold text-text-primary mb-2">Welcome back</h1>
            <p class="text-text-secondary">Admin Dashboard</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-text-secondary text-sm font-medium">Pending Cases</p>
                        <p id="pending-count" class="text-3xl font-bold text-warning">0</p>
                        <p id="urgent-count" class="text-text-secondary text-sm">0 urgent</p>
                    </div>
                    <div class="w-12 h-12 bg-warning-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-text-secondary text-sm font-medium">Resolved Today</p>
                        <p id="resolved-today" class="text-3xl font-bold text-success">0</p>
                        <p id="trend-percent" class="text-text-secondary text-sm">+0% from yesterday</p>
                    </div>
                    <div class="w-12 h-12 bg-success-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-text-secondary text-sm font-medium">Avg Resolution</p>
                        <p id="avg-resolution" class="text-3xl font-bold text-primary">0</p>
                        <p class="text-text-secondary text-sm">days</p>
                    </div>
                    <div class="w-12 h-12 bg-primary-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-text-secondary text-sm font-medium">Satisfaction</p>
                        <p id="satisfaction" class="text-3xl font-bold text-accent">0.0</p>
                        <p class="text-text-secondary text-sm">out of 5.0</p>
                    </div>
                    <div class="w-12 h-12 bg-accent-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Grievance Table -->
        <div class="mt-8">
            <div class="card">
                <h2 class="text-xl font-semibold text-text-primary mb-6">Grievance Management</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-surface border-b">
                            <tr>
                                <th class="p-3 text-left text-text-secondary font-medium">#</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Ref ID</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Category</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Subject</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Status</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Citizen</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Assign Officer</th>
                                <th class="p-3 text-left text-text-secondary font-medium">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="grievanceTableBody" class="divide-y">
                            <tr>
                                <td colspan="8" class="p-8 text-center text-text-secondary">Loading grievances...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Assign Officer Modal -->
    <div id="assign-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-lg max-w-md w-full">
            <div class="p-6">
                <h2 class="text-xl font-bold text-text-primary mb-6">Assign Officer</h2>
                <p class="text-text-secondary text-sm mb-4">Grievance: <span id="assign-grievance-info" class="font-semibold text-text-primary"></span></p>
                <select id="officer-select" class="w-full border rounded-lg p-3 mb-6">
                    <option value="">-- Select Officer --</option>
                </select>
                <div class="flex justify-end space-x-3">
                    <button onclick="closeAssignModal()" class="px-6 py-2 border border-gray-300 rounded-lg text-text-secondary hover:bg-gray-50">Cancel</button>
                    <button onclick="confirmAssignOfficer()" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary-700">Assign Officer</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    window.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token || role !== 'admin') {
            alert('Access denied. Admin login required.');
            window.location.href = 'login_screen.html';
            return;
        }

        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            document.getElementById('welcome-message').textContent = 'Welcome, ' + user.name;
        }
        
        // Load dashboard stats
        loadDashboardStats();
        
        loadOfficers().then(function() {
            loadGrievances();
        });
        
        // Auto-refresh stats every 30 seconds
        setInterval(loadDashboardStats, 30000);
    });

    function loadDashboardStats() {
        var token = localStorage.getItem('token');
        if (!token) return;
        
        fetch(window.location.protocol + '//' + window.location.hostname + ':5000/admin/dashboard-stats', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(function(res) { return res.json(); })
        .then(function(stats) {
            document.getElementById('pending-count').textContent = stats.pending || 0;
            document.getElementById('urgent-count').textContent = (stats.urgent || 0) + ' urgent';
            document.getElementById('resolved-today').textContent = stats.resolvedToday || 0;
            document.getElementById('trend-percent').textContent = (stats.trend > 0 ? '+' : '') + (stats.trend || 0) + '% from yesterday';
            document.getElementById('avg-resolution').textContent = stats.avgResolutionDays || 0;
            document.getElementById('satisfaction').textContent = stats.satisfaction || '0.0';
        })
        .catch(function(err) {
            console.error('Error loading dashboard stats:', err);
        });
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('role');
        localStorage.removeItem('user');
        window.location.href = 'login_screen.html';
    }

    var officersList = [];

    function loadOfficers() {
        var token = localStorage.getItem('token');
        if (!token) return Promise.resolve();
        
        return fetch(window.location.protocol + '//' + window.location.hostname + ':5000/admin/officers', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(function(res) { return res.json(); })
        .then(function(data) { officersList = data; })
        .catch(function(err) { console.error('Error loading officers:', err); });
    }

    function loadGrievances() {
        var token = localStorage.getItem("token");
        if (!token) return;
        
        fetch(window.location.protocol + '//' + window.location.hostname + ':5000/admin/grievances', {
            headers: { "Authorization": "Bearer " + token }
        })
        .then(function(res) { return res.json(); })
        .then(function(grievances) { renderGrievances(grievances); })
        .catch(function(err) { console.error(err); });
    }

    function renderGrievances(grievances) {
        var tableBody = document.getElementById("grievanceTableBody");
        if (!tableBody) return;
        
        tableBody.innerHTML = "";
        
        if (grievances.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="8" class="text-center p-8 text-text-secondary">No grievances found</td></tr>';
            return;
        }

        grievances.forEach(function(g, index) {
            var row = document.createElement("tr");
            row.className = "border-b";
            
            var assignedOfficer = g.assignedTo ? g.assignedTo.name : 'Not Assigned';
            var assignedOfficerId = g.assignedTo ? g.assignedTo._id : '';
            var statusClass = getStatusClass(g.status);

            row.innerHTML = 
                '<td class="p-3">' + (index + 1) + '</td>' +
                '<td class="p-3">' + (g.reference_id || 'N/A') + '</td>' +
                '<td class="p-3">' + (g.category || 'General') + '</td>' +
                '<td class="p-3">' + (g.subject || 'No subject') + '</td>' +
                '<td class="p-3"><span class="px-2 py-1 rounded text-xs ' + statusClass + '">' + (g.status || 'submitted') + '</span></td>' +
                '<td class="p-3">' + (g.user ? g.user.name : 'Unknown') + '</td>' +
                '<td class="p-3">' +
                    '<div class="text-sm mb-2">' + assignedOfficer + '</div>' +
                    '<button class="bg-primary text-white px-3 py-1 rounded text-xs hover:bg-primary-700 w-full" onclick="openAssignModal(\'' + g._id + '\', \'' + (g.reference_id || g._id) + '\', \'' + assignedOfficerId + '\')">Assign Officer</button>' +
                '</td>' +
                '<td class="p-3">' +
                    '<select id="status-' + g._id + '" class="border rounded p-1 text-sm mb-1 w-full">' +
                        '<option value="submitted" ' + (g.status === "submitted" ? "selected" : "") + '>Submitted</option>' +
                        '<option value="in_progress" ' + (g.status === "in_progress" ? "selected" : "") + '>In Progress</option>' +
                        '<option value="resolved" ' + (g.status === "resolved" ? "selected" : "") + '>Resolved</option>' +
                        '<option value="rejected" ' + (g.status === "rejected" ? "selected" : "") + '>Rejected</option>' +
                    '</select>' +
                    '<button class="bg-blue-500 text-white px-3 py-1 rounded text-xs w-full" onclick="updateStatus(\'' + g._id + '\')">Update Status</button>' +
                '</td>';
            tableBody.appendChild(row);
        });
    }

    function getStatusClass(status) {
        switch(status) {
            case 'submitted': return 'bg-gray-100 text-gray-800';
            case 'in_progress': return 'bg-yellow-100 text-yellow-800';
            case 'resolved': return 'bg-green-100 text-green-800';
            case 'rejected': return 'bg-red-100 text-red-800';
            default: return 'bg-gray-100 text-gray-800';
        }
    }

    var currentAssignGrievanceId = null;

    function openAssignModal(grievanceId, refId, currentOfficerId) {
        currentAssignGrievanceId = grievanceId;
        var modal = document.getElementById('assign-modal');
        var info = document.getElementById('assign-grievance-info');
        
        if (modal && info) {
            info.textContent = 'Reference: ' + (refId || grievanceId);
            var select = document.getElementById('officer-select');
            if (select) {
                select.innerHTML = '<option value="">-- Select Officer --</option>';
                officersList.forEach(function(o) {
                    var selected = o._id === currentOfficerId ? 'selected' : '';
                    select.innerHTML += '<option value="' + o._id + '" ' + selected + '>' + o.name + '</option>';
                });
            }
            modal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }
    }

    function closeAssignModal() {
        var modal = document.getElementById('assign-modal');
        if (modal) modal.classList.add('hidden');
        document.body.classList.remove('modal-open');
        currentAssignGrievanceId = null;
    }

    function confirmAssignOfficer() {
        var token = localStorage.getItem('token');
        var select = document.getElementById('officer-select');
        var officerId = select ? select.value : '';
        
        if (!currentAssignGrievanceId) { alert('No grievance selected'); return; }
        if (!officerId) { alert('Please select an officer'); return; }

        fetch(window.location.protocol + '//' + window.location.hostname + ':5000/admin/grievances/' + currentAssignGrievanceId + '/assign', {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ officerId: officerId })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.error) { alert('Error: ' + data.error); }
            else { alert('Officer assigned successfully!'); closeAssignModal(); loadGrievances(); }
        })
        .catch(function(err) { console.error('Error assigning officer:', err); alert('Error assigning officer'); });
    }

    function updateStatus(grievanceId) {
        var token = localStorage.getItem("token");
        var statusSelect = document.getElementById('status-' + grievanceId);
        var newStatus = statusSelect ? statusSelect.value : 'submitted';

        fetch(window.location.protocol + '//' + window.location.hostname + ':5000/admin/grievances/' + grievanceId + '/status', {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ status: newStatus })
        })
        .then(function(res) { return res.json(); })
        .then(function() { alert("Status updated successfully!"); loadGrievances(); })
        .catch(function(err) { console.error(err); alert("Error updating status"); });
    }
    </script>
</body>
</html>
